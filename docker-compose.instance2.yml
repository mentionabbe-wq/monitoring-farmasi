name: monitoring-farmasi-2
services:
  app:
    image: ghcr.io/mentionabbe-wq/monitoring-farmasi:latest
    container_name: monitoring-farmasi-2
    environment:
      - PORT=8080
      - DATA_DIR=/data
    ports:
      - "8088:8080"
    volumes:
      - /DATA/AppData/monitoring-farmasi-2/data:/data
    restart: unless-stopped
    x-casaos:
      volumes:
        - container: /data
          description:
            en_us: Folder penyimpanan database (instance 2)
      ports:
        - container: "8080"
          description:
            en_us: Port web aplikasi

x-casaos:
  architectures:
    - amd64
    - arm64
  main: app
  author: diana
  developer: diana
  category: Utilities
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/health-checks.png
  title:
    en_us: Monitoring Farmasi 2
  tagline:
    en_us: Instance kedua monitoring farmasi RS (data terpisah)
  description:
    en_us: >-
      Salinan kedua aplikasi Monitoring Farmasi dengan penyimpanan data
      terpisah. Untuk memasang lebih dari dua instance, salin file ini lalu
      ubah name, container_name, port host, dan folder volume /data agar unik.
  port_map: "8088"
  scheme: http
  index: /
